name: Postgres

on:
  workflow_dispatch:
  push:

jobs:
  postgres:
    runs-on: ubuntu-latest

    env:
      DB_USER: ${{ secrets.DB_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Start Postgres via docker compose
        run: docker compose up -d postgres

      - name: Wait for Postgres
        run: docker compose exec postgres pg_isready -U ${{ secrets.DB_USER }}

      - name: Test connection
        run: docker exec -e PGPASSWORD=${{ secrets.POSTGRES_PASSWORD }} postgres psql -U ${{ secrets.DB_USER }} -d ${{ secrets.POSTGRES_DB }} -c "SELECT version();"