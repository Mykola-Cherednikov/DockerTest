name: Postgres

on:
  workflow_dispatch:
  push:

jobs:
  postgres:
    runs-on: self-hosted

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Start Postgres via docker compose
        run: docker compose up -d postgres

      - name: Wait for Postgres
        run: docker compose exec postgres pg_isready -U postgres

      - name: Test connection
        run: docker compose exec -e PGPASSWORD=postgres postgres psql -U postgres -d postgres -c "SELECT version();"