name: Postgres

on:
  workflow_dispatch:
  push:

jobs:
  postgres:
    runs-on: self-hosted

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Start Postgres via docker compose
        run: docker compose up -d postgres
        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}

      - name: Wait for Postgres
        run: docker compose exec postgres pg_isready -U ${{ secrets.DB_USER }}

      - name: Test connection
        run: docker compose exec -e PGPASSWORD=${{ secrets.DB_PASSWORD }} postgres psql -U ${{ secrets.DB_USER }} -d ${{ secrets.DB_NAME }} -c "SELECT version();"